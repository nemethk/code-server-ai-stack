# squid.conf
# Strict allowlist-only outbound proxy for code-server AI CLI traffic.
# Strategy: allowlist specific domains, deny everything else.
#
# IMPORTANT: Do NOT add both .foo.com and api.foo.com to the same ACL name.
# Squid treats the shorter suffix as covering the longer one; having both
# causes a startup error ("ACL name already defined").

# ── Port and method restrictions ──────────────────────────────────────────────
acl SSL_ports  port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT    method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# ── Source: only accept from Docker internal networks ─────────────────────────
acl docker_nets src 172.16.0.0/12
acl docker_nets src 10.0.0.0/8
acl docker_nets src 192.168.0.0/16

http_access deny !docker_nets

# ── Allowlisted destination domains ──────────────────────────────────────────
# Anthropic / Claude Code CLI
acl allowed dstdomain .anthropic.com

# OpenAI / Codex CLI
acl allowed dstdomain .openai.com

# Google / Gemini CLI
# .googleapis.com covers generativelanguage.googleapis.com, oauth2.googleapis.com, etc.
# .google.com covers accounts.google.com and the OAuth browser flow
acl allowed dstdomain .googleapis.com
acl allowed dstdomain .google.com

# npm registry (npm install inside the container, extension installs)
acl allowed dstdomain registry.npmjs.org
acl allowed dstdomain .npmjs.com

# GitHub (git operations, extensions sourced from GitHub)
acl allowed dstdomain .github.com
acl allowed dstdomain .githubusercontent.com

# Telemetry (Claude Code, Codex, Gemini CLI all use these)
acl allowed dstdomain .sentry.io
acl allowed dstdomain .statsigapi.net

# ── Access rules ──────────────────────────────────────────────────────────────
http_access allow CONNECT allowed
http_access allow allowed
http_access deny all

# ── Caching: disabled ─────────────────────────────────────────────────────────
# AI API responses (especially streaming) must never be cached.
cache deny all
maximum_object_size 0 KB

# ── Privacy ───────────────────────────────────────────────────────────────────
# Do not add Via: or X-Forwarded-For: to upstream requests
via off
forwarded_for off

# ── Logging to stdout/stderr (docker logs compatible) ────────────────────────
access_log stdio:/dev/stdout
cache_log  stdio:/dev/stderr

http_port 3128
coredump_dir /var/spool/squid
