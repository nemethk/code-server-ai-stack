# nginx.conf

# Map the incoming Upgrade header to the correct Connection value.
# WebSocket requests get "upgrade"; regular requests get "close".
# This is the standard pattern for proxying code-server terminals.
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}

# ── HTTP: redirect everything to HTTPS ────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS: TLS termination + reverse proxy to code-server ─────────────────────
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;

    # Modern TLS only
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    # CSP is permissive to allow code-server's own assets, extensions, and WebSockets.
    add_header Content-Security-Policy   "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: wss: ws:;" always;

    # ── Proxy timeouts ────────────────────────────────────────────────────────
    # Long timeouts are required for code-server:
    #   - Terminal sessions can sit idle for hours
    #   - Large git operations / extension installs can be slow
    proxy_connect_timeout 60s;
    proxy_send_timeout    3600s;
    proxy_read_timeout    3600s;
    send_timeout          3600s;

    # ── Reverse proxy to code-server ──────────────────────────────────────────
    location / {
        proxy_pass         http://code-server:8080;

        # HTTP/1.1 required for WebSocket upgrade
        proxy_http_version 1.1;

        # WebSocket headers – critical for the integrated terminal
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        # Standard proxy headers
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable response buffering so terminal output streams in real time.
        # Without this, terminals freeze until nginx's buffer fills.
        proxy_buffering    off;
    }
}
